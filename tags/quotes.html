---
layout: default
tag: quotes
permalink: /ideas/quotes
---

<div class="header-bar">
  <h1 style= "text-transform: capitalize;">{{page.tag}}</h1>
</div>

<ul class="post-list quote-list">
  {% for post in site.categories.idea %}
  {% for tag in post.tags %}
  {% if tag == page.tag %}
    <li>
      <blockquote class="quote-card">
        <p class="quote-card__text">{{ post.quote }}</p>
        <footer>{{ post.author }}</footer>
      </blockquote>
    </li>
  {% endif %}
  {% endfor %}
  {% endfor %}
</ul>
