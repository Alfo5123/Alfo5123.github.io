<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perunator</title>
    <link rel="stylesheet" href="./styles.css?v=single-result-1" />
  </head>
  <body>
    <main class="shell">
      <section class="experience" aria-live="polite">
        <header class="brand">
          <h1>Perunator</h1>
        </header>

        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <section class="question-card" id="state">
          <h2 id="questionText"></h2>
          <p class="hint" id="hintText"></p>
        </section>

        <section class="stage" aria-label="Animated Papa Mood Bot mascot">
          <span class="spark left" aria-hidden="true"></span>
          <span class="spark right" aria-hidden="true"></span>
          <span class="spark lower" aria-hidden="true"></span>
          <div class="mascot-wrap">
            <img
              class="mascot"
              src="./assets/papa_mood_bot_final_mascot_transparent.png"
              alt="Papa Mood Bot potato mascot wearing an Andean hat"
            />
          </div>
        </section>

        <section class="actions" id="answerActions">
          <button class="answer yes" type="button" data-answer="s" aria-label="Yes">✔</button>
          <button class="answer unsure" type="button" data-answer="q" aria-label="Don't know">🤔</button>
          <button class="answer no" type="button" data-answer="n" aria-label="No">❌</button>
        </section>

        <section class="error-actions hidden" id="errorActions">
          <button class="restart" type="button" id="retryButton">Retry</button>
        </section>

        <section class="result hidden" id="result">
          <p class="result-label" data-i18n="resultLabel">Recommendation</p>
          <h2 id="dishName"></h2>
          <button class="restart restart-icon" type="button" id="restartButton">🔄</button>
        </section>
      </section>
    </main>
    <script src="./config.js?v=api-config-1"></script>
    <script src="./app.js?v=single-result-1"></script>
  </body>
</html>
